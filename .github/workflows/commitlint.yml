name: Commitlint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint-commits:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      # wagoid/commitlint-github-action bundles commitlint and reads
      # commitlint.config.mjs from the repo root. The .mjs extension
      # is required by the action (v6 rejects .js because atelier-ai
      # has no package.json#type to disambiguate). It also auto-
      # detects --from/--to per event type so we don't have to roll
      # the SHAs by hand. Bundled commitlint + on-demand install of
      # @wellmade/commitlint-config from npm fits this repo (no
      # package.json, no npm-side dev-deps to lean on).
      - uses: wagoid/commitlint-github-action@v6
        with:
          configFile: commitlint.config.mjs
          failOnWarnings: false
